# railway.toml — Konfigurasi deploy Railway
# Dokumentasi: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Health check — Railway akan cek endpoint ini setiap 30 detik
# Kalau gagal, Railway restart otomatis
healthcheckPath = "/health"
healthcheckTimeout = 10