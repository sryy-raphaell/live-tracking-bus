<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Monitor Semua Bus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/monitor.css">
</head>

<body>

    <!-- Header -->
    <div id="header">
        <div>
            <h1>
                <i data-lucide="map" class="icon" style="color: var(--accent);"></i>
                Monitor Armada
            </h1>
            <p id="conn-status">Menghubungkan...</p>
        </div>
        <div class="header-stats">
            <div class="stat">
                <div class="num green" id="count-online">0</div>
                <div class="lbl">Online</div>
            </div>
            <div class="stat">
                <div class="num slate" id="count-total">0</div>
                <div class="lbl">Total</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div id="main">
        <div id="map"></div>

        <div id="sidebar">
            <div id="sidebar-header">
                <i data-lucide="list" class="icon-sm"></i>
                Daftar Kendaraan
            </div>
            <div id="vehicle-list" class="custom-scrollbar">
                <div class="empty-msg">Belum ada kendaraan aktif.</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── Peta (default: Padang) ─────────────────────────────────────────────
        const map = L.map('map').setView([-0.9471, 100.4172], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // ── State ──────────────────────────────────────────────────────────────
        const vehicles = {};

        // ── Helpers ────────────────────────────────────────────────────────────
        function makeIcon(label, online) {
            return L.divIcon({
                html: `<div style="
                    background: ${online ? '#0ea5e9' : '#475569'};
                    border-radius: 50% 50% 50% 0;
                    transform: rotate(-45deg);
                    width: 36px; height: 36px;
                    display: flex; align-items: center; justify-content: center;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
                    border: 2px solid white;
                ">
                    <span style="transform:rotate(45deg); font-size:16px;">🚐</span>
                </div>
                <div style="
                    text-align:center;
                    font-size:10px;
                    font-weight:700;
                    color:white;
                    background:${online ? '#0284c7' : '#334155'};
                    border-radius:4px;
                    padding:1px 4px;
                    margin-top:2px;
                    white-space:nowrap;
                    max-width:80px;
                    overflow:hidden;
                    text-overflow:ellipsis;
                ">${label}</div>`,
                iconSize: [40, 52],
                iconAnchor: [20, 48],
                className: ''
            });
        }

        function makePopup(v) {
            return `
                <b>${v.vehicleCode}</b><br>
                Sopir: ${v.driverName || '—'}<br>
                ${v.route ? `Rute: ${v.route}<br>` : ''}
                ${v.isOnline ? '🟢 Online' : '⚫ Offline'}
            `;
        }

        function formatTime(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleTimeString('id-ID');
        }

        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function updateStats() {
            const all    = Object.keys(vehicles).length;
            const online = Object.values(vehicles).filter(v => v.isOnline).length;
            document.getElementById('count-online').innerText = online;
            document.getElementById('count-total').innerText  = all;
        }

        function renderSidebar() {
            const list   = document.getElementById('vehicle-list');
            const sorted = Object.values(vehicles).sort((a, b) => {
                if (a.isOnline !== b.isOnline) return b.isOnline - a.isOnline;
                return (a.vehicleCode || '').localeCompare(b.vehicleCode || '');
            });

            if (!sorted.length) {
                list.innerHTML = '<div class="empty-msg">Belum ada kendaraan terdaftar.</div>';
                return;
            }

            list.innerHTML = sorted.map(v => `
                <div class="v-item" id="item-${v.vehicleCode}" onclick="focusVehicle('${v.vehicleCode}')">
                    <div class="v-item-top">
                        <div class="v-name-row">
                            <div class="status-dot status-dot-sm ${v.isOnline ? 'online pulse' : ''}"></div>
                            <span class="v-name">${v.vehicleCode}</span>
                        </div>
                        <span class="v-badge ${v.isOnline ? 'online' : 'offline'}">
                            ${v.isOnline ? 'Online' : 'Offline'}
                        </span>
                    </div>

                    <!-- Nama sopir -->
                    <div style="
                        font-size: 0.78rem;
                        color: var(--accent-light);
                        margin: 4px 0 2px 15px;
                        display: flex;
                        align-items: center;
                        gap: 5px;
                    ">
                        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="4"/>
                            <path d="M20 21a8 8 0 1 0-16 0"/>
                        </svg>
                        ${v.driverName || '—'}
                    </div>

                    <!-- Rute (kalau ada) -->
                    ${v.route ? `
                    <div style="
                        font-size: 0.7rem;
                        color: var(--text-dim);
                        margin: 1px 0 2px 15px;
                        display: flex;
                        align-items: center;
                        gap: 5px;
                    ">
                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12h18M3 6h18M3 18h18"/>
                        </svg>
                        ${v.route}
                    </div>` : ''}

                    <!-- Koordinat -->
                    <div class="v-coords" style="margin-left:15px;">
                        ${v.lat ? `${Number(v.lat).toFixed(5)}, ${Number(v.lng).toFixed(5)}` : 'Lokasi belum tersedia'}
                    </div>

                    <!-- Waktu update -->
                    <div class="v-time" style="margin-left:15px;">
                        ${v.updatedAt ? 'Update: ' + formatTime(v.updatedAt) : ''}
                    </div>
                </div>
            `).join('');
        }

        function focusVehicle(vehicleCode) {
            const v = vehicles[vehicleCode];
            if (!v || !v.lat) return;
            map.setView([v.lat, v.lng], 16);
            if (v.marker) v.marker.openPopup();
            document.querySelectorAll('.v-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById(`item-${vehicleCode}`);
            if (item) item.classList.add('active');
        }

        function upsertVehicle(data) {
            // Normalkan field — server lama pakai vehicleId, server baru pakai vehicleCode
            const vehicleCode = data.vehicleCode || data.vehicleId || data.id;
            if (!vehicleCode) return;

            const existing  = vehicles[vehicleCode];
            const wasOnline = existing?.isOnline;

            vehicles[vehicleCode] = {
                ...(existing || {}),
                vehicleCode,
                lat:        data.lat        ?? existing?.lat,
                lng:        data.lng        ?? existing?.lng,
                updatedAt:  data.updatedAt  ?? existing?.updatedAt,
                driverName: data.driverName ?? existing?.driverName ?? '—',
                route:      data.route      ?? existing?.route      ?? '',
                isOnline:   data.isOnline !== undefined
                                ? data.isOnline
                                : (existing?.isOnline ?? false)
            };

            const v = vehicles[vehicleCode];

            // Update / buat marker peta
            if (v.lat && v.lng) {
                const icon   = makeIcon(vehicleCode, v.isOnline);
                const popup  = makePopup(v);
                if (!v.marker) {
                    v.marker = L.marker([v.lat, v.lng], { icon })
                        .addTo(map)
                        .bindPopup(popup);
                } else {
                    v.marker.setLatLng([v.lat, v.lng]);
                    v.marker.setIcon(icon);
                    v.marker.setPopupContent(popup);
                }
                vehicles[vehicleCode].marker = v.marker;
            }

            // Toast notifikasi perubahan status
            if (existing && wasOnline !== v.isOnline) {
                showToast(v.isOnline
                    ? `🟢 ${vehicleCode} mulai bertugas`
                    : `⚫ ${vehicleCode} offline`
                );
            }

            updateStats();
            renderSidebar();
        }

        // ── Socket.io ──────────────────────────────────────────────────────────
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('conn-status').innerText = 'Terhubung · Memuat data...';
            socket.emit('joinMonitor');
        });

        socket.on('disconnect', () => {
            document.getElementById('conn-status').innerText = '⚠️ Koneksi terputus';
        });

        socket.on('allLocations', (list) => {
            list.forEach(v => upsertVehicle(v));
            document.getElementById('conn-status').innerText = 'Live · Auto-update';

            // Fit peta ke semua marker kalau lebih dari 1
            const points = Object.values(vehicles)
                .filter(v => v.lat)
                .map(v => [v.lat, v.lng]);
            if (points.length > 1) map.fitBounds(points, { padding: [40, 40] });
        });

        socket.on('vehicleUpdate', (data) => {
            upsertVehicle(data);
        });

        // Init Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
