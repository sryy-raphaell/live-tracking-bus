<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Monitor Semua Angkot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/monitor.css">
</head>

<body>

    <!-- Header -->
    <div id="header">
        <div>
            <h1>
                <i data-lucide="map" class="icon" style="color: var(--accent);"></i>
                Monitor Armada
            </h1>
            <p id="conn-status">Menghubungkan...</p>
        </div>
        <div class="header-stats">
            <div class="stat">
                <div class="num green" id="count-online">0</div>
                <div class="lbl">Online</div>
            </div>
            <div class="stat">
                <div class="num slate" id="count-total">0</div>
                <div class="lbl">Total</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div id="main">
        <div id="map"></div>

        <div id="sidebar">
            <div id="sidebar-header">
                <i data-lucide="list" class="icon-sm"></i>
                Daftar Kendaraan
            </div>
            <div id="vehicle-list">
                <div class="empty-msg">Belum ada kendaraan aktif.</div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ── Peta (default: Padang) ─────────────────────────────────────────────
        const map = L.map('map').setView([-0.9471, 100.4172], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // ── State ──────────────────────────────────────────────────────────────
        const vehicles = {};   // { vehicleId: { lat, lng, updatedAt, isOnline, marker } }

        // ── Helpers ────────────────────────────────────────────────────────────
        function makeIcon(label, online) {
            return L.divIcon({
                html: `<div style="
                background: ${online ? '#0ea5e9' : '#475569'};
                border-radius: 50% 50% 50% 0;
                transform: rotate(-45deg);
                width: 36px; height: 36px;
                display: flex; align-items: center; justify-content: center;
                box-shadow: 0 2px 8px rgba(0,0,0,0.4);
                border: 2px solid white;
            ">
                <span style="transform:rotate(45deg); font-size:16px;">🚐</span>
            </div>
            <div style="
                text-align:center;
                font-size:10px;
                font-weight:700;
                color:white;
                background:${online ? '#0284c7' : '#334155'};
                border-radius:4px;
                padding:1px 4px;
                margin-top:2px;
                white-space:nowrap;
                max-width:80px;
                overflow:hidden;
                text-overflow:ellipsis;
            ">${label}</div>`,
                iconSize: [40, 52],
                iconAnchor: [20, 48],
                className: ''
            });
        }

        function formatTime(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleTimeString('id-ID');
        }

        function showToast(msg, duration = 3000) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        function updateStats() {
            const all = Object.keys(vehicles).length;
            const online = Object.values(vehicles).filter(v => v.isOnline).length;
            document.getElementById('count-online').innerText = online;
            document.getElementById('count-total').innerText = all;
        }

        function renderSidebar() {
            const list = document.getElementById('vehicle-list');
            const sorted = Object.values(vehicles).sort((a, b) => {
                // Online dulu, lalu urutkan alphabetical
                if (a.isOnline !== b.isOnline) return b.isOnline - a.isOnline;
                return a.vehicleId.localeCompare(b.vehicleId);
            });

            if (!sorted.length) {
                list.innerHTML = '<div class="empty-msg">Belum ada kendaraan terdaftar.</div>';
                return;
            }

            list.innerHTML = sorted.map(v => `
            <div class="v-item" id="item-${v.vehicleId}" onclick="focusVehicle('${v.vehicleId}')">
                <div class="v-item-top">
                    <div class="v-name-row">
                        <div class="v-dot ${v.isOnline ? 'online' : ''}"></div>
                        <span class="v-name">${v.vehicleId}</span>
                    </div>
                    <span class="v-badge ${v.isOnline ? 'online' : 'offline'}">
                        ${v.isOnline ? 'Online' : 'Offline'}
                    </span>
                </div>
                <div class="v-coords">
                    ${v.lat ? `${v.lat.toFixed(5)}, ${v.lng.toFixed(5)}` : 'Lokasi belum tersedia'}
                </div>
                <div class="v-time">
                    ${v.updatedAt ? 'Update: ' + formatTime(v.updatedAt) : ''}
                </div>
            </div>
        `).join('');
        }

        function focusVehicle(vehicleId) {
            const v = vehicles[vehicleId];
            if (!v || !v.lat) return;

            map.setView([v.lat, v.lng], 16);
            if (v.marker) v.marker.openPopup();

            // Highlight item di sidebar
            document.querySelectorAll('.v-item').forEach(el => el.classList.remove('active'));
            const item = document.getElementById(`item-${vehicleId}`);
            if (item) item.classList.add('active');
        }

        function upsertVehicle(data) {
            const { vehicleId, lat, lng, updatedAt, isOnline } = data;
            const existing = vehicles[vehicleId];
            const wasOnline = existing?.isOnline;

            // Update atau buat entry
            vehicles[vehicleId] = {
                ...(existing || {}),
                vehicleId, lat, lng, updatedAt,
                isOnline: isOnline !== undefined ? isOnline : (existing?.isOnline ?? false)
            };

            const v = vehicles[vehicleId];

            // Update atau buat marker di peta
            if (lat && lng) {
                const icon = makeIcon(vehicleId, v.isOnline);
                if (!v.marker) {
                    v.marker = L.marker([lat, lng], { icon })
                        .addTo(map)
                        .bindPopup(`<b>${vehicleId}</b><br>${v.isOnline ? '🟢 Online' : '⚫ Offline'}`);
                } else {
                    v.marker.setLatLng([lat, lng]);
                    v.marker.setIcon(icon);
                    v.marker.setPopupContent(`<b>${vehicleId}</b><br>${v.isOnline ? '🟢 Online' : '⚫ Offline'}`);
                }
                vehicles[vehicleId].marker = v.marker;
            }

            // Toast notifikasi perubahan status
            if (existing && wasOnline !== v.isOnline) {
                if (v.isOnline) {
                    showToast(`🟢 ${vehicleId} mulai bertugas`);
                } else {
                    showToast(`⚫ ${vehicleId} offline`);
                }
            }

            updateStats();
            renderSidebar();
        }

        // ── Socket.io ──────────────────────────────────────────────────────────
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('conn-status').innerText = 'Terhubung · Memuat data...';
            socket.emit('joinMonitor');
        });

        socket.on('disconnect', () => {
            document.getElementById('conn-status').innerText = '⚠️ Koneksi terputus';
        });

        // Snapshot awal semua kendaraan
        socket.on('allLocations', (list) => {
            list.forEach(v => upsertVehicle(v));
            document.getElementById('conn-status').innerText = 'Live · Auto-update';

            // Fit peta ke semua marker kalau ada
            const points = Object.values(vehicles).filter(v => v.lat).map(v => [v.lat, v.lng]);
            if (points.length > 1) map.fitBounds(points, { padding: [40, 40] });
        });

        // Update realtime per kendaraan
        socket.on('vehicleUpdate', (data) => {
            upsertVehicle(data);
        });

        // Init Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
