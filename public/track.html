<!DOCTYPE html>
<html>
<head>
    <title>Live Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="info">
        <b>Tracking: <span id="vid">...</span></b><br>
        Status: <span id="status">Connecting...</span>
    </div>
    <div id="map"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vehicleId = params.get('id') || 'Default-ID';
        document.getElementById('vid').innerText = vehicleId;

        // Inisialisasi Peta (Default: Jakarta)
        const map = L.map('map').setView([-6.2088, 106.8456], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Marker Angkot (Icon bisa diganti nanti)
        let marker = L.marker([-6.2088, 106.8456]).addTo(map);
        marker.bindPopup("Angkot Sedang Berjalan").openPopup();

        const socket = io();

        socket.on('connect', () => {
            socket.emit('joinRoom', vehicleId);
            document.getElementById('status').innerText = "Menunggu lokasi...";
        });

        // Terima update lokasi
        socket.on('locationUpdate', (data) => {
            const { lat, lng } = data;
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng]); // Kamera mengikuti angkot
            document.getElementById('status').innerText = "Live (Updated)";
        });
    </script>
</body>
</html>
