<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Live Tracking Angkot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="css/track.css">
</head>

<body>
    <div id="panel">
        <h2>
            <i data-lucide="radio" class="icon-sm" style="color: var(--accent);"></i>
            Live Tracking
        </h2>
        <div id="vehicle-name">—</div>
        <div id="status-label">
            <span class="panel-dot" id="dot"></span>
            <span id="status-text">Menghubungkan...</span>
        </div>
        <div id="last-update">Menunggu data pertama...</div>
    </div>

    <div id="offline-banner">
        <i data-lucide="wifi-off" class="icon-sm"></i>
        Sopir sedang offline
    </div>

    <div id="map"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vehicleId = params.get('id') || 'Angkot-01';
        document.getElementById('vehicle-name').innerText = vehicleId;

        const dot = document.getElementById('dot');
        const statusText = document.getElementById('status-text');
        const lastUpdate = document.getElementById('last-update');
        const offlineBanner = document.getElementById('offline-banner');

        const map = L.map('map').setView([-0.9471, 100.4172], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        const angkotIcon = L.divIcon({
            html: `<div style="
                background: var(--accent, #0ea5e9);
                border-radius:50%;
                width:40px;height:40px;
                display:flex;align-items:center;
                justify-content:center;
                font-size:20px;
                box-shadow:0 2px 8px rgba(0,0,0,0.4);
                border:3px solid white;
            ">🚐</div>`,
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            className: ''
        });

        let marker = null;
        let firstUpdate = true;

        const socket = io();

        socket.on('connect', () => {
            socket.emit('joinRoom', vehicleId);
            statusText.innerText = 'Menunggu lokasi sopir...';
        });

        socket.on('disconnect', () => {
            dot.className = 'panel-dot offline';
            statusText.innerText = 'Koneksi terputus';
        });

        socket.on('locationUpdate', (data) => {
            const { lat, lng } = data;

            if (!marker) {
                marker = L.marker([lat, lng], { icon: angkotIcon }).addTo(map);
                marker.bindPopup(`<b>${vehicleId}</b><br>Sedang beroperasi`).openPopup();
            } else {
                marker.setLatLng([lat, lng]);
            }

            if (firstUpdate) {
                map.setView([lat, lng], 16);
                firstUpdate = false;
            } else {
                map.panTo([lat, lng]);
            }

            const waktu = new Date().toLocaleTimeString('id-ID');
            lastUpdate.innerText = `Diperbarui: ${waktu}`;
            dot.className = 'panel-dot online';
            statusText.innerText = 'Live';
            offlineBanner.style.display = 'none';
        });

        socket.on('driverStatus', (data) => {
            if (data.online) {
                dot.className = 'panel-dot online';
                statusText.innerText = 'Sopir aktif';
                offlineBanner.style.display = 'none';
            } else {
                dot.className = 'panel-dot offline';
                statusText.innerText = 'Sopir offline';
                offlineBanner.style.display = 'flex';
                lastUpdate.innerText = 'Lokasi terakhir ditampilkan';
            }
        });

        // Init Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
